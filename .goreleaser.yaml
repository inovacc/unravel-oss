version: 2

project_name: unravel

before:
  hooks:
    - go mod tidy

builds:
  - env:
      - CGO_ENABLED=0
    goos:
      - linux
      - windows
      - darwin
    goarch:
      - amd64
      - arm64
    # darwin is temporarily excluded from release artifacts: the
    # github.com/inovacc/sealbox@v0.3.0 dependency does not cross-compile to
    # darwin (mock_keymanager.go references maxSealableSize/sealedKeySize,
    # defined only under non-darwin build tags). Re-enable once sealbox
    # cross-compiles. Tracked in docs/BACKLOG.md.
    ignore:
      - goos: darwin
    ldflags:
      - -s -w -X unravel/cmd.Version={{.Version}}

archives:
  - formats: [tar.gz]
    name_template: >-
      {{ .ProjectName }}_
      {{- title .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "386" }}i386
      {{- else }}{{ .Arch }}{{ end }}
    format_overrides:
      - goos: windows
        formats: [zip]

checksum:
  name_template: checksums.txt

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^chore:'
      - '^ci:'

release:
  draft: false
  prerelease: auto
